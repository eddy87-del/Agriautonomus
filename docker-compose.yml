version: '3'

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"

  postgres:
    image: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agriautonomous

  mqtt:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
